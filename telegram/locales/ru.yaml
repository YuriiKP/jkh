help_manual_text: |-
  📖 <b>Как подключиться к VPN</b>

  - Перейдите по ссылке подписки
  - На странице будут ссылки на приложене happ (app store, google play, windows)
  - После установки приложения нажимаем на кнопку добавить подписку и она автоматически добавися в приложение happ



  <b>ДРУГИЕ СПОСОБЫ УСТАНОВКИ:</b>

  📱 <b>Для Android | iOS:</b>

  1. Скопируйте ссылку на подписку
  2. Скачайте приложение любой подходящий клиент (happ, v2raytun, hiddify ...)
  3. Откройте и нажмите на "+" в правом верхнем углу
  4. Выберите "Вставить из буфера обмена" или "QR-код"
  5. Нажмите "Подключиться"

  <b>💻 Для Windows | macOS</b>
  Можно скачать страницы на <a href="https://github.com/Happ-proxy">Github</a>

  <b>📋 Реестр допущенного оборудования:)</b>
      • <b>Clash X</b> (macOS)
      • <b>v2raytun</b> (Android, Windows, Ios, macOs)
      • <b>v2rayN</b> (Windows)
      • <b>Hiddify</b> (Android, Windows, iOS, macOS, Linux)


  💡 <i>Если возникли проблемы, пишите @foteleg_b</i>

