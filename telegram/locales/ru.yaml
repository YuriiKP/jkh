rules_text: |-
  🔹 Условия использования:

  1. Сервис (VLESS) — только для шифрования трафика. Запрещено использование для обхода блокировок и белых списков.
  2. Запрещены незаконные действия, передача аккаунтов и обход лимитов нагрузки.
  3. Пользователь сам несет ответственность за свой аккаунт и соблюдение законов.
  4. Администрация вправе заблокировать нарушителя без возврата средств.
  5. Возврат оплаты только при неисправности сервиса. Вопросы — в поддержку.
