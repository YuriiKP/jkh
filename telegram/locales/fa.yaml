rules_text: |-
  🔹 شرایط استفاده:

  ۱. سرویس (VLESS) — فقط برای رمزگذاری ترافیک. استفاده برای دور زدن تحریم‌ها و لیست‌های سفید ممنوع است.
  ۲. اقدامات غیرقانونی، انتقال حساب‌ها و دور زدن محدودیت‌های بار مجاز نیست.
  ۳. کاربر خود مسئول حساب خود و رعایت قوانین است.
  ۴. مدیریت حق دارد متخلف را بدون بازگشت وجه مسدود کند.
  ۵. بازگشت وجه فقط در صورت خرابی سرویس. سؤالات — به پشتیبانی.
