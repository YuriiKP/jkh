start_help_message: |-
  🏢 <b>شرکت مدیریت «ЖКХ ВПН»</b> <i>(کانال مسکونی هاستینگ)</i>

  — تأمین <b>فشار بالا</b> در بزرگراه‌های دیجیتال شما.
  — اتصال هرگونه دستگاه خانگی (iOS, Android, PC).

  <i>من برای پیشنهادات و انتقادات باز هستم! اگر چیزی کار نمی‌کند، مشکلی پیش آمده، یا موقعیت مکانی مورد نظرتان موجود نیست، به من @foteleg_b پیام دهید. سعی می‌کنم همه چیز را پیاده‌سازی کنم. من خودم از این ВПН استفاده می‌کنم، بنابراین عملکرد و بازخورد آن برایم مهم است.</i>

trial_days_text: |-
  🔎 <b>دوره آزمایشی</b>

  شما به دوره آزمایشی دسترسی پیدا کردید!

  🔗 <b>لینک اشتراک:</b>
  {full_url}

  📱 <b>نحوه استفاده:</b>
  ۱. لینک بالا را کپی کنید
  ۲. برنامه VPN را باز کنید
  ۳. اشتراک را از طریق لینک اضافه کنید

  ⏰ دوره آزمایشی ۳ روز معتبر است.

help_text: |-
  🆘 در این بخش موجود است:

  راه‌اندازی: راهنمای گام به گام برای راه‌اندازی سریع.

  رفع مشکل: کمک در صورت بروز مشکل در اتصال.

  برای هرگونه سؤال به من @foteleg_b پیام دهید، برای گفتگو و پیشنهادات باز هستم.

help_manual_text: |-
  📖 <b>نحوه اتصال به VPN</b>

  - به لینک اشتراک بروید
  - در صفحه، لینک‌هایی به برنامه happ (app store, google play, windows) خواهد بود
  - پس از نصب برنامه، روی دکمه افزودن اشتراک کلیک کنید و به طور خودکار به برنامه happ اضافه می‌شود



  <b>روش‌های دیگر نصب:</b>

  📱 <b>برای Android | iOS:</b>

  ۱. لینک اشتراک را کپی کنید
  ۲. برنامه کلاینت مناسب (happ, v2raytun, hiddify ...) را دانلود کنید
  ۳. باز کرده و روی "+" در گوشه بالا سمت راست کلیک کنید
  ۴. "چسباندن از کلیپ‌بورد" یا "QR-کد" را انتخاب کنید
  ۵. "اتصال" را بزنید

  <b>💻 برای Windows | macOS</b>
  می‌توانید صفحات را از <a href="https://github.com/Happ-proxy">Github</a> دانلود کنید

  <b>📋 ثبت تجهیزات مجاز :)</b>
      • <b>Clash X</b> (macOS)
      • <b>v2raytun</b> (Android, Windows, Ios, macOs)
      • <b>v2rayN</b> (Windows)
      • <b>Hiddify</b> (Android, Windows, iOS, macOS, Linux)


  💡 <i>اگر مشکلی پیش آمد، به @foteleg_b پیام دهید</i>

