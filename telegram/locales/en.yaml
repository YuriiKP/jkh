help_text: |-
  🆘 This section provides:

  Setup: Step-by-step guides for quick launch.

  Troubleshooting: Help if you encounter difficulties with connection.

  For any questions, write to me @foteleg_b, open to communication and suggestions.

help_manual_text: |-
  📖 <b>How to connect to VPN</b>

  - Go to the subscription link
  - The page will have links to the happ application (app store, google play, windows)
  - After installing the app, click the add subscription button and it will automatically be added to the happ app



  <b>OTHER INSTALLATION METHODS:</b>

  📱 <b>For Android | iOS:</b>

  1. Copy the subscription link
  2. Download any suitable client application (happ, v2raytun, hiddify ...)
  3. Open it and click on "+" in the top right corner
  4. Select "Paste from clipboard" or "QR-code"
  5. Click "Connect"

  <b>💻 For Windows | macOS</b>
  You can download pages from <a href="https://github.com/Happ-proxy">Github</a>

  <b>📋 Registry of approved equipment:)</b>
      • <b>Clash X</b> (macOS)
      • <b>v2raytun</b> (Android, Windows, Ios, macOs)
      • <b>v2rayN</b> (Windows)
      • <b>Hiddify</b> (Android, Windows, iOS, macOS, Linux)


  💡 <i>If you have any problems, write @foteleg_b</i>

